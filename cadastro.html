<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .container {
      max-width: 800px;
      margin: 50px auto;
      background: #111;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px #FFD70044;
    }
    .container input, .container button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    .container button {
      font-weight: bold;
      cursor: pointer;
    }
    .file-label {
      background: #046909af;
      padding: 10px;
      display: inline-block;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      margin-bottom: 10px;
    }
    .file-label:hover { background: #017e0796; }
    #imagemUpload { display: none; }
    .search-box {
      margin: 20px 0;
    }
    .produtos { margin-top: 40px; padding-bottom: 150px; /* Space for footer */ }
    .produto-item {
      background: #222;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .produto-item img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      animation: imageShimmer 1.2s ease-out;
    }

    .produto-item:hover img {
      transform: scale(1.1) rotate(2deg);
      box-shadow: 0 5px 20px rgba(111, 64, 255, 0.6);
      filter: brightness(1.05);
    }
    .produto-info { flex-grow: 1; }
    .produto-actions { position: relative; }
    .menu-btn {
      background: none;
      border: none;
      color: #FFD700;
      font-size: 22px;
      cursor: pointer;
    }
    .menu-popup {
      position: absolute;
      right: 0;
      top: 25px;
      background: #333;
      border: 1px solid #555;
      border-radius: 8px;
      z-index: 10;
      display: none;
      flex-direction: column;
    }
    .menu-popup button {
      background: none;
      color: white;
      padding: 8px 10px;
      text-align: left;
      border: none;
      width: 100%;
      cursor: pointer;
    }
    .menu-popup button:hover { background: #555; }
    .modal {
      background: rgba(0,0,0,0.8);
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
    }
    .modal-content {
      background: #222;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
    }
    .modal-content button {
      margin: 10px;
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-confirm { background: red; color: white; }
    .btn-cancel { background: #444; color: white; }
  </style>
</head>
<body>


<div class="grid-background"></div>
<div class="container">
  <h2 style="color:#ffd900; text-align:center;">Cadastrar Produto</h2>
  <form id="formProduto">
    <input type="text" id="nome" placeholder="Nome do Produto" required>
    <input type="text" id="preco" placeholder="Preço" required>
    <input type="text" id="imagemUrl" placeholder="URL da Imagem (opcional)">
    <label for="imagemUpload" class="file-label">Escolher imagem (opcional)</label>
    <input type="file" id="imagemUpload" accept="image/*">
    <input type="hidden" id="editIndex">
    <button type="submit">Salvar Produto</button>
  </form>
  <div class="search-box">
    <input type="text" id="searchProduto" placeholder="Buscar produto..." style="width:100%; padding:10px; border-radius:8px; border:none;">
  </div>
  <div class="produtos" id="listaProdutos"></div>
</div>

<!-- Modal de Remoção -->
<div class="modal" id="modalRemover" style="display:none;">
  <div class="modal-content">
    <p>Tem certeza que deseja remover este produto?</p>
    <button class="btn-confirm" onclick="removerConfirmado()">Sim, remover</button>
    <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<!-- Modal de Edição - AGORA ESTÁ FORA -->
<div class="modal" id="modalEditar" style="display:none;">
  <div class="modal-content" style="width: 100%; max-width: 500px;">
    <h3 style="color:#ffd900bb;">Editar Produto</h3>
    <form id="formEditar">
      <input type="text" id="editNome" placeholder="Nome" required>
      <input type="text" id="editPreco" placeholder="Preço" required>
      <input type="text" id="editImagemUrl" placeholder="URL da imagem (opcional)">
      <label for="editImagemUpload" class="file-label">Escolher nova imagem</label>
      <input type="file" id="editImagemUpload" accept="image/*">
      <input type="hidden" id="editIndexFinal">
      <br>
      <button type="submit" class="btn-confirm">Salvar alterações</button>
      <button type="button" class="btn-cancel" onclick="fecharModalEditar()">Cancelar</button>
    </form>
  </div>
</div>


  </div>
</div>

<script src="cadastro.js"></script>

<div style="text-align:center; margin-top:20px;">
  <button onclick="logout()" style="padding:10px 20px; margin:5px; background:#444; color:white; border:none; border-radius:8px; cursor:pointer;">Logout</button>
  <a href="index.html" style="padding:10px 20px; background:#FFD700; color:#000; border-radius:8px; text-decoration:none;">Voltar para loja</a>
</div>
<script>
  if (!localStorage.getItem("token")) {
    alert("Você precisa estar logado!");
    window.location.href = "login.html";
  }
  function logout() {
    localStorage.removeItem("token");
    alert("Você saiu.");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
